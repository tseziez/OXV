const PROFILES = {
  tsengel: { name: 'Цэнгэл', emoji: '☀️' },
  nyamdulam: { name: 'Нямдулам', emoji: '🌸' },
};

const DAY_NAMES = ['Даваа', 'Мягмар', 'Лхагва', 'Пүрэв', 'Баасан', 'Бямба', 'Ням'];
const DAY_SHORT = ['Да', 'Мя', 'Лх', 'Пү', 'Ба', 'Бя', 'Ня'];

const CAT_COLORS = {
  self: '#e8c5b0', meal: '#f3d9a4', work: '#c8b6a6', study: '#b8c5d6',
  gym: '#d4a5a5', free: '#c5d6c5',
};

// State
let state = {
  activeProfile: 'tsengel',
  activeTab: 'today',
  currentDay: new Date().getDay() === 0 ? 7 : new Date().getDay(),
  editMode: false,
  notifEnabled: true,
  schedules: JSON.parse(JSON.stringify(DEFAULT_SCHEDULES)),
  completed: { tsengel: {}, nyamdulam: {} },
  streaks: { tsengel: 0, nyamdulam: 0 },
  lastCheck: { tsengel: null, nyamdulam: null },
  notes: { tsengel: '', nyamdulam: '' },
};

// Storage
function save() {
  try {
    localStorage.setItem('bidHoyor', JSON.stringify({
      schedules: state.schedules, completed: state.completed,
      streaks: state.streaks, lastCheck: state.lastCheck,
      notes: state.notes, notifEnabled: state.notifEnabled,
    }));
  } catch (e) { console.error('Save error', e); }
}

function load() {
  try {
    const raw = localStorage.getItem('bidHoyor');
    if (raw) {
      const d = JSON.parse(raw);
      if (d.schedules) state.schedules = d.schedules;
      if (d.completed) state.completed = d.completed;
      if (d.streaks) state.streaks = d.streaks;
      if (d.lastCheck) state.lastCheck = d.lastCheck;
      if (d.notes) state.notes = d.notes;
      if (typeof d.notifEnabled === 'boolean') state.notifEnabled = d.notifEnabled;
    }
  } catch (e) { console.error('Load error', e); }
}

function todayKey() {
  return `day-${state.currentDay}-${new Date().toISOString().split('T')[0]}`;
}

function render() {
  document.body.className = state.activeProfile;
  const p = PROFILES[state.activeProfile];
  const tasks = state.schedules[state.activeProfile][state.currentDay] || [];
  const key = todayKey();
  const completedMap = state.completed[state.activeProfile]?.[key] || {};
  const doneCount = tasks.filter(t => completedMap[t.id]).length;
  const progress = tasks.length > 0 ? Math.round((doneCount / tasks.length) * 100) : 0;

  document.getElementById('greeting').textContent = `${p.emoji} Сайн уу, ${p.name}!`;
  document.getElementById('subtitle').textContent = `Өнөөдөр ${DAY_NAMES[state.currentDay - 1]} • ${progress}% дууссан`;
  document.getElementById('streak').textContent = `${state.streaks[state.activeProfile]} өдөр`;
  document.getElementById('todayProgress').textContent = `${doneCount}/${tasks.length}`;
  document.getElementById('progressFill').style.width = `${progress}%`;
  document.getElementById('taskCount').textContent = `${tasks.length} ажил байна`;

  // Profile buttons
  document.querySelectorAll('.profile-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.profile === state.activeProfile);
  });

  // Tabs
  document.querySelectorAll('.tab').forEach(t => {
    t.classList.toggle('active', t.dataset.tab === state.activeTab);
  });
  document.getElementById('tabToday').classList.toggle('hidden', state.activeTab !== 'today');
  document.getElementById('tabWeek').classList.toggle('hidden', state.activeTab !== 'week');
  document.getElementById('tabStats').classList.toggle('hidden', state.activeTab !== 'stats');
  document.getElementById('tabNotes').classList.toggle('hidden', state.activeTab !== 'notes');

  // Notification banner
  renderNotifBanner();

  if (state.activeTab === 'today') renderToday();
  else if (state.activeTab === 'week') renderWeek();
  else if (state.activeTab === 'stats') renderStats();
  else if (state.activeTab === 'notes') renderNotes();
}

function renderNotifBanner() {
  const banner = document.getElementById('notifBanner');
  const today = new Date().getDay() === 0 ? 7 : new Date().getDay();
  if (!state.notifEnabled || state.currentDay !== today) {
    banner.classList.add('hidden');
    return;
  }
  const now = new Date();
  const cur = now.getHours() * 60 + now.getMinutes();
  const tasks = state.schedules[state.activeProfile][state.currentDay] || [];
  let upcoming = null;
  for (const t of tasks) {
    const [start] = t.time.split('-');
    const [h, m] = start.split(':').map(Number);
    const taskMin = h * 60 + m;
    if (taskMin > cur && taskMin - cur <= 30) { upcoming = t; break; }
  }
  if (upcoming) {
    banner.classList.remove('hidden');
    document.getElementById('notifText').textContent = `${upcoming.time} • ${upcoming.task}`;
  } else {
    banner.classList.add('hidden');
  }
}

function renderToday() {
  // Day picker
  const dp = document.getElementById('dayPicker');
  dp.innerHTML = '';
  for (let d = 1; d <= 7; d++) {
    const btn = document.createElement('button');
    btn.className = 'day-btn' + (d === state.currentDay ? ' active' : '');
    btn.textContent = DAY_SHORT[d - 1];
    btn.onclick = () => { state.currentDay = d; render(); };
    dp.appendChild(btn);
  }

  // Edit button
  const editBtn = document.getElementById('editBtn');
  editBtn.textContent = state.editMode ? '💾 Дуусгах' : '✏️ Засах';
  editBtn.classList.toggle('active', state.editMode);
  document.getElementById('addBtn').classList.toggle('hidden', !state.editMode);

  // Tasks
  const list = document.getElementById('tasksList');
  list.innerHTML = '';
  const tasks = state.schedules[state.activeProfile][state.currentDay] || [];
  const key = todayKey();
  const completedMap = state.completed[state.activeProfile]?.[key] || {};

  tasks.forEach(task => {
    const isDone = !!completedMap[task.id];
    const div = document.createElement('div');
    div.className = 'task' + (isDone ? ' done' : '');

    if (state.editMode) {
      div.innerHTML = `
        <div class="task-icon" style="background: ${CAT_COLORS[task.cat] || '#d4a574'}">${task.icon}</div>
        <div class="task-content">
          <input class="time-input" value="${task.time}" />
          <input class="task-input" value="${task.task.replace(/"/g, '&quot;')}" />
        </div>
        <button class="task-delete">🗑️</button>
      `;
      const inputs = div.querySelectorAll('input');
      inputs[0].oninput = (e) => { task.time = e.target.value; save(); };
      inputs[1].oninput = (e) => { task.task = e.target.value; save(); };
      div.querySelector('.task-delete').onclick = () => {
        state.schedules[state.activeProfile][state.currentDay] =
          state.schedules[state.activeProfile][state.currentDay].filter(t => t.id !== task.id);
        save();
        render();
      };
    } else {
      div.innerHTML = `
        <div class="task-icon" style="background: ${CAT_COLORS[task.cat] || '#d4a574'}">${task.icon}</div>
        <div class="task-content">
          <div class="task-time">${task.time}</div>
          <div class="task-title">${task.task}</div>
        </div>
        <button class="task-check">${isDone ? '✅' : '⭕'}</button>
      `;
      div.querySelector('.task-check').onclick = () => toggleTask(task.id);
    }
    list.appendChild(div);
  });
}

function toggleTask(taskId) {
  const key = todayKey();
  if (!state.completed[state.activeProfile]) state.completed[state.activeProfile] = {};
  if (!state.completed[state.activeProfile][key]) state.completed[state.activeProfile][key] = {};
  state.completed[state.activeProfile][key][taskId] = !state.completed[state.activeProfile][key][taskId];

  // Check streak
  const tasks = state.schedules[state.activeProfile][state.currentDay] || [];
  const allDone = tasks.every(t => state.completed[state.activeProfile][key][t.id]);
  const today = new Date().toISOString().split('T')[0];
  if (allDone && state.lastCheck[state.activeProfile] !== today) {
    const yesterday = new Date(Date.now() - 86400000).toISOString().split('T')[0];
    state.streaks[state.activeProfile] = state.lastCheck[state.activeProfile] === yesterday
      ? state.streaks[state.activeProfile] + 1 : 1;
    state.lastCheck[state.activeProfile] = today;
  }
  save();
  render();
}

function renderWeek() {
  const c = document.getElementById('tabWeek');
  c.innerHTML = '';
  for (let d = 1; d <= 7; d++) {
    const tasks = state.schedules[state.activeProfile][d] || [];
    const key = `day-${d}-${new Date().toISOString().split('T')[0]}`;
    const done = tasks.filter(t => state.completed[state.activeProfile]?.[key]?.[t.id]).length;
    const div = document.createElement('div');
    div.className = 'week-card';
    div.innerHTML = `
      <div class="week-day-icon">${DAY_SHORT[d - 1]}</div>
      <div class="week-info">
        <div class="week-name">${DAY_NAMES[d - 1]}</div>
        <div class="week-meta">${tasks.length} ажил • ${done} дууссан</div>
      </div>
      <div style="font-size: 20px; opacity: 0.5;">›</div>
    `;
    div.onclick = () => { state.currentDay = d; state.activeTab = 'today'; render(); };
    c.appendChild(div);
  }
}

function renderStats() {
  const c = document.getElementById('tabStats');
  // Calculate
  const stats = { total: 0, done: 0, byCategory: {} };
  const today = new Date();
  for (let i = 0; i < 7; i++) {
    const d = new Date(today);
    d.setDate(today.getDate() - i);
    const dow = d.getDay() === 0 ? 7 : d.getDay();
    const key = `day-${dow}-${d.toISOString().split('T')[0]}`;
    const tasks = state.schedules[state.activeProfile][dow] || [];
    const cMap = state.completed[state.activeProfile]?.[key] || {};
    tasks.forEach(t => {
      stats.total++;
      if (cMap[t.id]) {
        stats.done++;
        stats.byCategory[t.cat] = (stats.byCategory[t.cat] || 0) + 1;
      }
    });
  }
  const pct = stats.total > 0 ? Math.round((stats.done / stats.total) * 100) : 0;
  const maxVal = Math.max(...Object.values(stats.byCategory), 1);

  const cats = [
    { key: 'work', label: 'Online business', icon: '💼' },
    { key: 'study', label: 'Хятад хэл', icon: '🇨🇳' },
    { key: 'gym', label: 'Дасгал/Gym', icon: '💪' },
    { key: 'self', label: 'Skin care', icon: '💧' },
    { key: 'meal', label: 'Хоол', icon: '🍱' },
    { key: 'free', label: 'Чөлөөт цаг', icon: '✨' },
  ];

  c.innerHTML = `
    <div class="stat-big">
      <div class="stat-big-label stat-label">7 ХОНОГИЙН ТАЙЛАН</div>
      <div class="stat-big-value stat-value">${pct}%</div>
      <div class="stat-big-meta subtitle">${stats.done} / ${stats.total} ажил</div>
    </div>
    <div style="font-size: 13px; font-weight: 700; margin-bottom: 12px;" class="task-title">Ангиллаар</div>
    ${cats.map(cat => {
      const cnt = stats.byCategory[cat.key] || 0;
      const w = (cnt / maxVal) * 100;
      return `
        <div class="cat-row">
          <div class="cat-header">
            <div class="cat-icon" style="background: ${CAT_COLORS[cat.key]}">${cat.icon}</div>
            <div class="cat-label task-title">${cat.label}</div>
            <div class="cat-count task-title">${cnt}</div>
          </div>
          <div class="cat-bar"><div class="cat-bar-fill" style="width: ${w}%"></div></div>
        </div>
      `;
    }).join('')}
  `;
}

function renderNotes() {
  const c = document.getElementById('tabNotes');
  const p = PROFILES[state.activeProfile];
  c.innerHTML = `
    <div class="notes-card">
      <div class="notes-header">
        <span style="font-size: 18px;">📖</span>
        <div class="notes-title">${p.name}-ийн тэмдэглэл</div>
      </div>
      <textarea id="notesArea" placeholder="Өнөөдрийнхөө бодол, мэдрэмж, цаашдын зорилгоо энд бичээрэй...">${state.notes[state.activeProfile] || ''}</textarea>
      <div class="notes-count" id="notesCount">${(state.notes[state.activeProfile] || '').length} тэмдэгт</div>
    </div>
    <div class="notes-card" style="margin-top: 14px;">
      <div style="display: flex; align-items: center; gap: 12px;">
        <span style="font-size: 18px;">🔔</span>
        <div style="flex: 1;">
          <div class="notes-title">Сэрэмжлүүлэг</div>
          <div class="subtitle" style="font-size: 12px;">30 минутын өмнө сануулна</div>
        </div>
        <button class="toggle ${state.notifEnabled ? 'on' : 'off'} ${state.activeProfile}" id="notifToggle">
          <div class="toggle-knob"></div>
        </button>
      </div>
    </div>
    <div class="notes-card" style="margin-top: 14px;">
      <div class="notes-title" style="margin-bottom: 10px;">📥 Дата хадгалах</div>
      <div class="subtitle" style="font-size: 12px; margin-bottom: 12px;">Утсаа солих юм уу аппыг өөр газар руу шилжүүлэхээс өмнө дата хадгалаарай.</div>
      <button class="install-btn" id="exportBtn" style="margin-right: 8px;">⬇️ Экспорт</button>
      <button class="install-btn" id="importBtn" style="background: #888;">⬆️ Импорт</button>
      <input type="file" id="importFile" style="display: none;" accept=".json" />
    </div>
  `;
  const area = document.getElementById('notesArea');
  area.oninput = (e) => {
    state.notes[state.activeProfile] = e.target.value;
    document.getElementById('notesCount').textContent = `${e.target.value.length} тэмдэгт`;
    save();
  };
  document.getElementById('notifToggle').onclick = () => {
    state.notifEnabled = !state.notifEnabled;
    save();
    render();
  };
  document.getElementById('exportBtn').onclick = exportData;
  document.getElementById('importBtn').onclick = () => document.getElementById('importFile').click();
  document.getElementById('importFile').onchange = importData;
}

function exportData() {
  const data = localStorage.getItem('bidHoyor') || '{}';
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `bid-hoyor-${new Date().toISOString().split('T')[0]}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function importData(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    try {
      localStorage.setItem('bidHoyor', ev.target.result);
      load();
      render();
      alert('Амжилттай импортлоо!');
    } catch (err) {
      alert('Алдаа гарлаа');
    }
  };
  reader.readAsText(file);
}

// Event listeners
document.querySelectorAll('.profile-btn').forEach(btn => {
  btn.onclick = () => { state.activeProfile = btn.dataset.profile; render(); };
});
document.querySelectorAll('.tab').forEach(tab => {
  tab.onclick = () => { state.activeTab = tab.dataset.tab; render(); };
});
document.getElementById('editBtn').onclick = () => { state.editMode = !state.editMode; render(); };
document.getElementById('addBtn').onclick = () => {
  const newId = `${state.activeProfile[0]}${state.currentDay}-${Date.now()}`;
  state.schedules[state.activeProfile][state.currentDay].push({
    id: newId, time: '00:00-00:00', task: 'Шинэ ажил', icon: '✨', cat: 'free',
  });
  save();
  render();
};

// Refresh notification banner every minute
setInterval(renderNotifBanner, 60000);

// Install prompt
let deferredPrompt;
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('installPrompt').classList.add('show');
});
document.getElementById('installBtn').onclick = async () => {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    await deferredPrompt.userChoice;
    deferredPrompt = null;
    document.getElementById('installPrompt').classList.remove('show');
  }
};
document.getElementById('installClose').onclick = () => {
  document.getElementById('installPrompt').classList.remove('show');
};

// Init
load();
render();
</script>
</body>
</html>
